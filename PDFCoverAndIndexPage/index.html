<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="Build ordered PDF bundles with cover pages, pagination, OCR, and burn-in redactions."
    />
    <meta name="theme-color" content="#111827" />
    <title>Dossier Builder</title>
    <script>
      if (window.location.protocol === "file:") {
        window.location.replace(new URL("./dist/index.html", window.location.href).href);
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <p
      id="local-launch-fallback"
      style="display:none;font-family:Segoe UI,Arial,sans-serif;max-width:42rem;margin:3rem auto;padding:0 1.25rem;color:#0f172a;line-height:1.6;"
    >
      If the app does not open automatically, use
      <a href="./dist/index.html">dist/index.html</a>.
    </p>
    <script>
      if (window.location.protocol === "file:") {
        document.getElementById("local-launch-fallback")?.style.setProperty("display", "block");
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
